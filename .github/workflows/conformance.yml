name: conformance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e ".[conformance,cli,dev]"
      # Full suite via testpaths (sm_arp lib + conformance + cli) — not just
      # conformance/, so the consumable library's own tests gate every PR.
      - run: pytest -v
      - run: ruff check sm_arp/
